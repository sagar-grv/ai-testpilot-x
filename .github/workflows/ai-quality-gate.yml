name: AI Quality Gate

# Runs AI TestPilot X as a quality gate on every push and pull request.
# Exit code 0 (GO) = CI passes.  1 (GO WITH RISK) or 2 (NO GO) = CI fails.

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  ai-quality-gate:
    name: AI TestPilot X - Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI quality gate
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY not set — skipping AI quality gate (add secret to enable)"
            exit 0
          fi
          python -m cli.main run \
            --story "User should be able to login and checkout successfully" \
            --mode MOCK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EXECUTION_MODE: MOCK
          DB_URL: sqlite:///./testpilot_ci.db
          CHROMA_PATH: ./chroma_ci
        # Exit code 0 = GO (CI passes)
        # Exit code 1 = GO WITH RISK (CI fails)
        # Exit code 2 = NO GO (CI fails)

      # -- Option B: Analyze bugs from your existing test output --
      # Uncomment to analyze a stack trace from your own test runner:
      #
      # - name: Analyze test failures
      #   if: failure()
      #   run: python -m cli.main bugs --log "${{ env.TEST_ERROR_LOG }}"
      #   env:
      #     GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # -- Upload report as artifact --
      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-testpilot-report
          path: .testpilot/reports/
          if-no-files-found: ignore
