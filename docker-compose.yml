version: "3.8"

# AI TestPilot X — Selenium Grid for real browser execution
# Usage:
#   docker-compose up -d
#   Set EXECUTION_MODE=GRID and SELENIUM_GRID_URL=http://localhost:4444/wd/hub in .env

services:
  selenium-hub:
    image: selenium/hub:4.20.0
    container_name: testpilot-selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    restart: unless-stopped

  chrome-node-1:
    image: selenium/node-chrome:4.20.0
    container_name: testpilot-chrome-1
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_SESSION_TIMEOUT=300
    shm_size: 2g
    restart: unless-stopped

  chrome-node-2:
    image: selenium/node-chrome:4.20.0
    container_name: testpilot-chrome-2
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_SESSION_TIMEOUT=300
    shm_size: 2g
    restart: unless-stopped
